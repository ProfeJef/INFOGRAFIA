<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ruta semanal ASE</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="loading">Cargando...</div>

  <div id="welcomeOverlay">
    <div class="welcomeBox">
      <h1>Ruta semanal ASE</h1>
      <p>
        Recorre el camino, acércate a cada día y presiona <strong>E</strong>
        para descubrir su aporte al aprendizaje social y emocional.
      </p>
      <p class="hint">También puedes usar flechas, WASD o controles táctiles.</p>
      <button id="startBtn">Comenzar</button>
    </div>
  </div>

  <header id="hud">
    <div class="hudBar">
      <span class="hudIcon">❤️</span>
      <span>ASE</span>
      <div class="barOuter">
        <div id="aseBar" class="barInner red"></div>
      </div>
      <span id="asePct">0%</span>
    </div>

    <div class="hudBar">
      <span class="hudIcon">📅</span>
      <span>SEMANA</span>
      <div class="barOuter">
        <div id="weekBar" class="barInner yellow"></div>
      </div>
      <span id="weekPct">0%</span>
    </div>

    <div class="hudBar">
      <span class="hudIcon">✨</span>
      <span>FLOW</span>
      <div class="barOuter">
        <div id="flowBar" class="barInner green"></div>
      </div>
      <span id="flowPct">0%</span>
    </div>

    <div id="progressBox">
      <div id="progressFill"></div>
      <span id="progressText">0/5 dias</span>
    </div>
  </header>

  <div id="gameWrap">
    <canvas id="game" width="1024" height="576"></canvas>
  </div>

  <div id="fade"></div>

  <div id="joystickZone">
    <div id="joystickStick"></div>
  </div>

  <button id="btnAction" aria-label="Interactuar">E</button>

  <div id="modalOverlay">
    <div class="modalBox">
      <div id="modalTag">DÍA</div>
      <h2 id="modalTitle">Título</h2>
      <div id="modalBody"></div>
      <button id="closeBtn">Cerrar</button>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/components.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
